name: Create Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for the release (for example, vX.Y.Z)'
        required: true
        type: string
      version:
        description: 'Release version without the leading v (for example, X.Y.Z)'
        required: true
        type: string
      upstream_alignment:
        description: 'Result of upstream android/skills release alignment check'
        required: true
        type: string

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Validate release inputs
        env:
          TAG_NAME: ${{ inputs.tag_name }}
          VERSION: ${{ inputs.version }}
        run: |
          if [[ "$VERSION" == v* ]]; then
            echo "version must omit the leading v; got version=$VERSION" >&2
            exit 1
          fi

          expected_tag="v${VERSION}"
          if [[ "$TAG_NAME" != "$expected_tag" ]]; then
            echo "tag_name must be v<version>; got tag_name=$TAG_NAME and version=$VERSION" >&2
            exit 1
          fi

      - name: Install validation dependencies
        run: |
          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y jq
          fi

      - name: Validate plugin manifest versions
        env:
          VERSION: ${{ inputs.version }}
        run: |
          mismatched_versions="$(
            jq -r --arg version "$VERSION" '
              select(.version != $version) | "\(.name) has version \(.version), expected \($version)"
            ' plugins/*/.codex-plugin/plugin.json
          )"

          if [[ -n "$mismatched_versions" ]]; then
            echo "Plugin manifest versions must match the release version:" >&2
            echo "$mismatched_versions" >&2
            exit 1
          fi

      - name: Validate Codex plugins
        run: scripts/validate-codex-plugins.sh

      - name: Create marketplace archive
        run: |
          git archive \
            --format=zip \
            --output=android-skills-codex-marketplace.zip \
            HEAD \
            .agents/plugins \
            plugins \
            scripts \
            README.md \
            CHANGELOG.md \
            LICENSE.txt \
            docs

      - name: Write release notes
        env:
          REPOSITORY: ${{ github.repository }}
          TAG_NAME: ${{ inputs.tag_name }}
          VERSION: ${{ inputs.version }}
          UPSTREAM_ALIGNMENT: ${{ inputs.upstream_alignment }}
        run: |
          {
            echo "Android Skills Codex marketplace release ${TAG_NAME}."
            echo
            echo "All bundled plugin manifests use version ${VERSION}."
            echo
            echo "Upstream android/skills alignment:"
            echo "- ${UPSTREAM_ALIGNMENT}"
            echo
            echo "Install the latest release channel:"
            echo '```bash'
            echo "codex plugin marketplace add ${REPOSITORY} --ref latest"
            echo "codex plugin marketplace upgrade android-skills-codex"
            echo '```'
            echo
            echo "Install this pinned release:"
            echo '```bash'
            echo "codex plugin marketplace add ${REPOSITORY} --ref ${TAG_NAME}"
            echo '```'
            echo
            echo "Plugins:"
            echo "- android-cli-tools"
            echo "- android-app-capabilities"
            echo "- android-build-and-release"
            echo "- android-ui-migration"
            echo "- android-xr-glimmer"
            echo
            echo "Changed plugins and skills:"
            echo "- android-cli-tools ${VERSION}: android-cli-base"
            echo "- android-app-capabilities ${VERSION}: appfunctions, engage-sdk-integration, verified-email"
            echo "- android-build-and-release ${VERSION}: agp-9-upgrade, play-billing-library-version-upgrade, perfetto-sql, perfetto-trace-analysis, r8-analyzer, testing-setup"
            echo "- android-ui-migration ${VERSION}: adaptive, camera1-to-camerax, edge-to-edge, migrate-xml-views-to-jetpack-compose, navigation-3, styles"
            echo "- android-xr-glimmer ${VERSION}: display-glasses-with-jetpack-compose-glimmer"
            echo
            echo "Update behavior:"
            echo "- latest is the moving stable release ref updated by this workflow."
            echo "- Git tags such as ${TAG_NAME} are pinned install channels."
            echo "- If installed from latest, CLI users only need codex plugin marketplace upgrade android-skills-codex."
            echo "- If installed from ${TAG_NAME}, change the Git ref to move to a newer pinned release."
            echo "- Codex App users can change the Git ref to move between latest and a pinned tag."
            echo
            echo "Artifact:"
            echo "- android-skills-codex-marketplace.zip contains .agents/plugins, plugins, scripts, README.md, CHANGELOG.md, LICENSE.txt, and docs."
            echo
            echo "See CHANGELOG.md for the full release entry."
          } > release-notes.md

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ inputs.tag_name }}
        run: |
          gh release create "$TAG_NAME" android-skills-codex-marketplace.zip --title "Release $TAG_NAME" --notes-file release-notes.md --target main

      - name: Update latest release ref
        run: |
          git push origin HEAD:latest --force
