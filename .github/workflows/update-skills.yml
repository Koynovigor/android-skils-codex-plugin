name: Update Skills

on:
  workflow_dispatch:
  # TODO(JoseAlcerreca): enable schedule when ready
  # schedule:
  #   - cron: '0 * * * *' # Runs at minute 0 of every hour

permissions:
  contents: write

jobs:
  update-skills:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.ADR_GITHUB_BOT_PAT }}

      - name: Install validation dependencies
        run: |
          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y jq
          fi

      - name: Download and extract dac_skills
        run: |
          source_root="$RUNNER_TEMP/android-skills-upstream"
          zip_path="$RUNNER_TEMP/dac_skills.zip"
          rm -rf "$source_root"
          mkdir -p "$source_root"

          curl -L -o "$zip_path" https://dl.google.com/dac/dac_skills.zip
          unzip -o "$zip_path" -d "$source_root"
          rm -f "$zip_path"

      - name: Overlay github-skills branch
        run: |
          git fetch origin github-skills

          upstream_root="$RUNNER_TEMP/android-skills-upstream"
          source_root="$RUNNER_TEMP/github-skills"
          rm -rf "$source_root"
          mkdir -p "$source_root"

          # Export the branch into a temp folder. This avoids index errors.
          git archive FETCH_HEAD | tar -x -C "$source_root"

          for path in android-cli build camera jetpack-compose navigation performance play system xr; do
            if [ -d "$source_root/$path" ]; then
              rm -rf "$upstream_root/$path"
              cp -R "$source_root/$path" "$upstream_root/$path"
            fi
          done

          rm -rf "$source_root"
          echo "Successfully overlaid legacy skill directories from github-skills branch."

      - name: Refresh legacy root skill directories
        run: |
          source_root="$RUNNER_TEMP/android-skills-upstream"

          # Keep Codex marketplace packaging paths intact during refreshes.
          rm -rf android-cli build camera jetpack-compose navigation performance play system xr

          for path in android-cli build camera jetpack-compose navigation performance play system xr; do
            if [ -d "$source_root/$path" ]; then
              cp -R "$source_root/$path" "$path"
            fi
          done

      - name: Verify protected Codex packaging paths
        run: |
          test -d .github
          test -f README.md
          test -f LICENSE.txt

          for path in .agents plugins scripts docs CHANGELOG.md; do
            if git ls-files -- "$path" | grep -q .; then
              test -e "$path"
            fi
          done

      - name: Sync and validate Codex plugins
        run: |
          SOURCE_ROOT="$RUNNER_TEMP/android-skills-upstream" scripts/sync-codex-plugins.sh
          scripts/validate-codex-plugins.sh
          rm -rf "$RUNNER_TEMP/android-skills-upstream"

      - name: Commit and push changes
        run: |
          git config user.name "android-devrel-github-bot"
          git config user.email "android-devrel-github-bot@users.noreply.github.com"
          git add -A
          # The '|| true' ensures the workflow doesn't fail if there's nothing new
          git commit -m "Updates skills ($(date +'%Y-%m-%d %H:%M'))" || echo "No changes to commit"
          git push origin main
